<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>区域/城市管理 - CSP竞品情报系统</title>
  <link rel="stylesheet" href="../styles/main.css">
  <style>
    body { margin: 0; background: #F5F5F5; }
    .admin-layout { display: flex; min-height: 100vh; }
    .admin-sidebar { width: 220px; background: linear-gradient(180deg, #1E3A5F 0%, #0F1F33 100%); color: #fff; padding: 0; flex-shrink: 0; position: fixed; height: 100vh; }
    .sidebar-logo { padding: 24px 20px; font-size: 18px; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar-nav { padding: 16px 0; }
    .nav-section { margin-bottom: 8px; }
    .nav-section-title { padding: 8px 20px; font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; }
    .sidebar-item { display: flex; align-items: center; padding: 12px 20px; color: rgba(255,255,255,0.7); font-size: 14px; text-decoration: none; }
    .sidebar-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .sidebar-item.active { background: rgba(255,255,255,0.15); color: #fff; border-left: 3px solid #fff; }
    .sidebar-icon { width: 20px; margin-right: 12px; text-align: center; }
    .admin-main { flex: 1; margin-left: 220px; }
    .admin-content { padding: 24px; }
    .page-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #333; display: flex; justify-content: space-between; align-items: center; }
    .add-btn { background: #1E3A5F; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 14px; border: none; cursor: pointer; }
    .region-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .region-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .region-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .region-name { font-size: 16px; font-weight: 600; color: #333; }
    .region-level { font-size: 11px; background: rgba(30,58,95,0.08); color: #1E3A5F; padding: 3px 8px; border-radius: 4px; margin-left: 8px; }
    .region-stats { display: flex; gap: 20px; margin-bottom: 14px; }
    .stat-item { text-align: center; }
    .stat-value { font-size: 20px; font-weight: 600; color: #1E3A5F; }
    .stat-label { font-size: 11px; color: #999; }
    .city-list { border-top: 1px solid #f0f0f0; padding-top: 12px; }
    .city-tag { display: inline-block; background: #f5f5f5; padding: 4px 10px; border-radius: 4px; font-size: 12px; color: #666; margin: 4px; }
    .action-row { display: flex; gap: 8px; margin-top: 12px; }
    .action-btn { flex: 1; height: 32px; border-radius: 6px; font-size: 12px; border: none; cursor: pointer; }
    .action-btn.edit { background: rgba(30,58,95,0.08); color: #1E3A5F; }
    .action-btn.view { background: #f5f5f5; color: #666; }
    .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,0.75); color: #fff; padding: 16px 32px; border-radius: 8px; font-size: 14px; z-index: 1000; display: none; }
    .toast.show { display: block; }
  </style>
</head>
<body>
  <div class="admin-layout">
    <div class="admin-sidebar">
      <div class="sidebar-logo">📊 CSP竞品情报</div>
      <div class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">数据中心</div>
          <a href="index.html" class="sidebar-item"><span class="sidebar-icon">🏠</span><span>首页概览</span></a>
          <a href="alert-center.html" class="sidebar-item"><span class="sidebar-icon">⚠️</span><span>异常预警</span></a>
          <a href="reports.html" class="sidebar-item"><span class="sidebar-icon">📈</span><span>数据报表</span></a>
          <a href="review-admin.html" class="sidebar-item"><span class="sidebar-icon">✅</span><span>修改审批</span></a>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">基础管理</div>
          <a href="brand.html" class="sidebar-item"><span class="sidebar-icon">🏢</span><span>品牌管理</span></a>
          <a href="competitor.html" class="sidebar-item"><span class="sidebar-icon">⚔️</span><span>竞品关系</span></a>
          <a href="#" class="sidebar-item active"><span class="sidebar-icon">📍</span><span>区域/城市</span></a>
          <a href="counter.html" class="sidebar-item"><span class="sidebar-icon">🏪</span><span>柜台管理</span></a>
        </div>
      </div>
    </div>
    
    <div class="admin-main">

                <div class="stat-label">商场</div>
              </div>
              <div class="stat-item">

            </div>
            <div class="city-list">
              <span class="city-tag">北京</span>
              <span class="city-tag">天津</span>
              <span class="city-tag">青岛</span>
            </div>
            <div class="action-row">
              <button class="action-btn edit" onclick="showToast('编辑中...')">编辑</button>
              <button class="action-btn view" onclick="showToast('查看商场列表')">商场</button>
            </div>
          </div>
          
          <div class="region-card">
            <div class="region-header">
              <span class="region-name">华南<span class="region-level">大区</span></span>
            </div>
            <div class="region-stats">

              </div>
              <div class="stat-item">
                <div class="stat-value">32</div>

              </div>
              <div class="stat-item">

            <div class="region-stats">

              <div class="stat-item">

            <div class="city-list">

            <div class="action-row">

          </div>
        </div>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>
  
  <script>
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
