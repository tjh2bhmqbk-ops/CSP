<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>数据异常柜台 - CSP竞品情报系统</title>
  <link rel="stylesheet" href="../styles/main.css">
  <style>
    body { background: #f5f5f5; }
    .mini-app { padding-bottom: 20px; }
    
    .page-header {
      background: linear-gradient(135deg, #1E3A5F 0%, #2D5A8E 100%);
      color: #fff;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .back-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #fff;
      text-decoration: none;
    }
    
    .page-title { flex: 1; font-size: 17px; font-weight: 600; }
    
    .summary-bar {
      background: rgba(250, 173, 20, 0.1);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .summary-icon { font-size: 24px; }
    
    .summary-text {
      flex: 1;
      font-size: 14px;
      color: #FAAD14;
    }
    
    .summary-count {
      font-size: 20px;
      font-weight: 600;
      color: #FAAD14;
    }
    
    .counter-list { padding: 16px; }
    
    .counter-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border-left: 3px solid #FAAD14;
    }
    
    .counter-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .counter-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .badge { width: 8px; height: 8px; border-radius: 50%; }
    .badge.core { background: #F5222D; }
    .badge.normal { background: #8C8C8C; }
    
    .counter-name {
      font-size: 15px;
      font-weight: 500;
      color: #333;
    }
    
    .counter-status {
      background: rgba(250, 173, 20, 0.1);
      color: #FAAD14;
      padding: 4px 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .abnormal-reason {
      background: rgba(245, 34, 45, 0.08);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    
    .reason-title {
      font-size: 13px;
      font-weight: 500;
      color: #F5222D;
      margin-bottom: 6px;
    }
    
    .reason-detail {
      font-size: 12px;
      color: #666;
    }
    
    .data-compare {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    
    .compare-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 13px;
    }
    
    .compare-label { color: #666; }
    .compare-value { color: #333; font-weight: 500; }
    .compare-value.danger { color: #F5222D; }
    .compare-value.success { color: #52C41A; }
    
    .action-row {
      display: flex;
      gap: 10px;
    }
    
    .action-btn {
      flex: 1;
      height: 40px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      cursor: pointer;
    }
    
    .action-btn.remind {
      background: #1E3A5F;
      color: #fff;
    }
    
    .action-btn.reject {
      background: rgba(245, 34, 45, 0.1);
      color: #F5222D;
    }
    
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 16px 32px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 1000;
      display: none;
    }
    
    .toast.show { display: block; animation: fadeIn 0.3s ease; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
  </style>
</head>
<body>
  <div class="mini-app">
    <div class="page-header">
      <a href="index.html" class="back-btn">‹</a>
      <div class="page-title">数据异常柜台</div>
    </div>
    
    <div class="summary-bar">
      <span class="summary-icon">📈</span>
      <span class="summary-text">以下柜台数据存在异常，请核实处理</span>
      <span class="summary-count">2</span>
    </div>
    
    <div class="counter-list">
      <div class="counter-card">
        <div class="counter-header">
          <div class="counter-brand">
            <span class="badge core"></span>
            <span class="counter-name">Louis Vuitton</span>
          </div>
          <span class="counter-status">⚠️ 数据异常</span>
        </div>
        
        <div class="abnormal-reason">
          <div class="reason-title">异常描述</div>
          <div class="reason-detail">今日上报销售额突增200%，远超历史均值</div>
        </div>
        
        <div class="data-compare">
          <div class="compare-row">
            <span class="compare-label">上报金额</span>
            <span class="compare-value danger">¥168,000</span>
          </div>
          <div class="compare-row">
            <span class="compare-label">历史均值</span>
            <span class="compare-value">¥56,000</span>
          </div>
          <div class="compare-row">
            <span class="compare-label">波动幅度</span>
            <span class="compare-value danger">↑ 200%</span>
          </div>
        </div>
        
        <div class="action-row">
          <button class="action-btn remind" onclick="remind()">🔔 催BA核实</button>
          <button class="action-btn reject" onclick="reject()">✗ 驳回数据</button>
        </div>
      </div>
      
      <div class="counter-card">
        <div class="counter-header">
          <div class="counter-brand">
            <span class="badge core"></span>
            <span class="counter-name">Hermès 爱马仕</span>
          </div>
          <span class="counter-status">⚠️ 数据异常</span>
        </div>
        
        <div class="abnormal-reason">
          <div class="reason-title">异常描述</div>
          <div class="reason-detail">数据偏离均值过大，疑似录入错误</div>
        </div>
        
        <div class="data-compare">
          <div class="compare-row">
            <span class="compare-label">上报金额</span>
            <span class="compare-value danger">¥28,600</span>
          </div>
          <div class="compare-row">
            <span class="compare-label">历史均值</span>
            <span class="compare-value">¥98,500</span>
          </div>
          <div class="compare-row">
            <span class="compare-label">波动幅度</span>
            <span class="compare-value danger">↓ 71%</span>
          </div>
        </div>
        
        <div class="action-row">
          <button class="action-btn remind" onclick="remind()">🔔 催BA核实</button>
          <button class="action-btn reject" onclick="reject()">✗ 驳回数据</button>
        </div>
      </div>
    </div>
    
    <div class="toast" id="toast"></div>
  </div>
  
  <script>
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
    
    function remind() {
      showToast('✓ 已发送核实提醒');
    }
    
    function reject() {
      showToast('✗ 数据已驳回');
    }
  </script>
</body>
</html>
