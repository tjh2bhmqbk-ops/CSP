<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>未上报柜台 - CSP竞品情报系统</title>
  <link rel="stylesheet" href="../styles/main.css">
  <style>
    body { background: #f5f5f5; }
    .mini-app { padding-bottom: 20px; }
    
    .page-header {
      background: linear-gradient(135deg, #1E3A5F 0%, #2D5A8E 100%);
      color: #fff;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .back-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #fff;
      text-decoration: none;
    }
    
    .page-title { flex: 1; font-size: 17px; font-weight: 600; }
    
    .summary-bar {
      background: rgba(245, 34, 45, 0.1);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .summary-icon { font-size: 24px; }
    
    .summary-text {
      flex: 1;
      font-size: 14px;
      color: #F5222D;
    }
    
    .summary-count {
      font-size: 20px;
      font-weight: 600;
      color: #F5222D;
    }
    
    .counter-list { padding: 16px; }
    
    .counter-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    
    .counter-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .counter-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .badge { width: 8px; height: 8px; border-radius: 50%; }
    .badge.core { background: #F5222D; }
    .badge.normal { background: #8C8C8C; }
    
    .counter-name {
      font-size: 15px;
      font-weight: 500;
      color: #333;
    }
    
    .counter-days {
      background: rgba(245, 34, 45, 0.1);
      color: #F5222D;
      padding: 4px 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .counter-info {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 4px;
    }
    
    .info-row:last-child { margin-bottom: 0; }
    
    .info-label { color: #666; }
    .info-value { color: #333; font-weight: 500; }
    
    .action-btn {
      width: 100%;
      height: 40px;
      background: #1E3A5F;
      color: #fff;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      cursor: pointer;
    }
    
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 16px 32px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 1000;
      display: none;
    }
    
    .toast.show { display: block; animation: fadeIn 0.3s ease; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
  </style>
</head>
<body>
  <div class="mini-app">
    <div class="page-header">
      <a href="index.html" class="back-btn">‹</a>
      <div class="page-title">未上报柜台</div>
    </div>
    
    <div class="summary-bar">
      <span class="summary-icon">⚠️</span>
      <span class="summary-text">以下柜台已连续多日未上报竞品数据</span>
      <span class="summary-count">3</span>
    </div>
    
    <div class="counter-list">
      <div class="counter-card">
        <div class="counter-header">
          <div class="counter-brand">
            <span class="badge core"></span>
            <span class="counter-name">Dior 迪奥</span>
          </div>
          <span class="counter-days">已断报 3 天</span>
        </div>
        <div class="counter-info">
          <div class="info-row">
            <span class="info-label">所在商场</span>
            <span class="info-value">上海新天地</span>
          </div>
          <div class="info-row">
            <span class="info-label">最后上报</span>
            <span class="info-value">04-17</span>
          </div>
          <div class="info-row">
            <span class="info-label">负责人</span>
            <span class="info-value">陈小明</span>
          </div>
        </div>
        <button class="action-btn" onclick="remind()">🔔 发送催报提醒</button>
      </div>
      
      <div class="counter-card">
        <div class="counter-header">
          <div class="counter-brand">
            <span class="badge core"></span>
            <span class="counter-name">Louis Vuitton</span>
          </div>
          <span class="counter-days">已断报 5 天</span>
        </div>
        <div class="counter-info">
          <div class="info-row">
            <span class="info-label">所在商场</span>
            <span class="info-value">上海恒隆广场</span>
          </div>
          <div class="info-row">
            <span class="info-label">最后上报</span>
            <span class="info-value">04-15</span>
          </div>
          <div class="info-row">
            <span class="info-label">负责人</span>
            <span class="info-value">张丽丽</span>
          </div>
        </div>
        <button class="action-btn" onclick="remind()">🔔 发送催报提醒</button>
      </div>
      
      <div class="counter-card">
        <div class="counter-header">
          <div class="counter-brand">
            <span class="badge normal"></span>
            <span class="counter-name">Gucci 古驰</span>
          </div>
          <span class="counter-days">已断报 2 天</span>
        </div>
        <div class="counter-info">
          <div class="info-row">
            <span class="info-label">所在商场</span>
            <span class="info-value">北京国金中心</span>
          </div>
          <div class="info-row">
            <span class="info-label">最后上报</span>
            <span class="info-value">04-18</span>
          </div>
          <div class="info-row">
            <span class="info-label">负责人</span>
            <span class="info-value">刘芳</span>
          </div>
        </div>
        <button class="action-btn" onclick="remind()">🔔 发送催报提醒</button>
      </div>
    </div>
    
    <div class="toast" id="toast"></div>
  </div>
  
  <script>
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
    
    function remind() {
      showToast('✓ 催报提醒已发送');
    }
  </script>
</body>
</html>
